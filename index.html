<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エポラーシェ コンテンツカレンダー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700;800&family=Shippori+Mincho:wght@500;700&display=swap');
:root{
  --bg:#edeae4;--wh:#fff;--sf:#f7f4ef;
  --bd:#ddd8d0;--bd2:#c5bdb4;
  --nv:#1a3a5c;--nv2:#2e5f8a;--nvl:#e8f0f8;
  --gd:#b8832a;--gdl:#fef6e4;
  --ok:#1e6b45;--okl:#e4f5ec;
  --rd:#b91c1c;--rdl:#fef2f2;
  --cp:#6d28d9;--cpl:#f3eeff;
  --tx:#1a1410;--tx2:#4a3f35;--tx3:#8a7d72;
  --r:10px;--rs:6px;
  --sh:0 2px 10px rgba(0,0,0,.09);--sh2:0 6px 24px rgba(0,0,0,.16);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'M PLUS 1p',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;line-height:1.6;}

.hd{background:var(--nv);height:48px;display:flex;align-items:center;padding:0 14px;gap:10px;box-shadow:0 2px 6px rgba(0,0,0,.3);position:sticky;top:0;z-index:100;}
.hd-logo{font-family:'Shippori Mincho',serif;font-size:14px;color:#fff;letter-spacing:.06em;white-space:nowrap;}
.hd-logo span{color:#f0c87a;}
.hd-sp{flex:1;}
.hd-upd{color:rgba(255,255,255,.6);font-size:10px;white-space:nowrap;}
.hd-btn{padding:4px 12px;border-radius:14px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:#fff;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;}
.hd-btn:hover{background:rgba(255,255,255,.15);}

.main{max-width:860px;margin:0 auto;padding:14px 10px 60px;}

/* 月ナビ */
.mnav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px;}
.mnav-btn{width:34px;height:34px;border-radius:50%;border:2px solid var(--bd2);background:#fff;color:var(--nv);font-size:15px;font-weight:800;cursor:pointer;transition:.15s;}
.mnav-btn:hover{border-color:var(--nv);background:var(--nvl);}
.mnav-label{font-family:'Shippori Mincho',serif;font-size:19px;font-weight:700;color:var(--nv);letter-spacing:.08em;min-width:150px;text-align:center;}

/* 凡例 */
.legend{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;font-size:10px;color:var(--tx3);}
.legend b{font-weight:800;}
.lg-cp{color:var(--gd);}
.lg-rec{color:var(--cp);}

/* カレンダー */
.cal{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);background:var(--nv);}
.cal-week div{padding:6px 2px;text-align:center;font-size:10px;font-weight:800;color:#fff;letter-spacing:.05em;}
.cal-week div:first-child{color:#f3b0b0;}
.cal-week div:last-child{color:#a9c8ea;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cell{min-height:76px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:4px 4px 5px;cursor:pointer;transition:background .12s;position:relative;display:flex;flex-direction:column;gap:2px;background:#fff;}
.cell:nth-child(7n){border-right:none;}
.cell:hover{background:var(--nvl);}
.cell.other{background:var(--sf);cursor:default;}
.cell.other:hover{background:var(--sf);}
.cell.today{outline:2.5px solid var(--gd);outline-offset:-2.5px;background:var(--gdl);}
.cell.is-cp{background:#fdf7ea;}
.cell.is-cp:hover{background:#faf0d8;}
.dnum{font-size:11px;font-weight:800;color:var(--tx2);}
.cell.sun .dnum{color:var(--rd);}
.cell.sat .dnum{color:var(--nv2);}
.dprod{font-size:9.5px;font-weight:700;color:var(--nv);line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:break-all;}
.dbadge{display:inline-block;font-size:8px;font-weight:800;border-radius:3px;padding:0 4px;line-height:1.5;align-self:flex-start;}
.b-cp{background:var(--gd);color:#fff;}
.b-rec{background:var(--cp);color:#fff;}
.dmiss{font-size:8px;color:var(--rd);font-weight:700;}

/* ローディング / エラー */
.notice{background:var(--wh);border:1.5px solid var(--bd);border-radius:var(--r);padding:22px;text-align:center;color:var(--tx3);margin-top:20px;box-shadow:var(--sh);}
.notice.err{border-color:var(--rd);color:var(--rd);text-align:left;font-size:12px;line-height:1.9;}

/* モーダル */
.ov{display:none;position:fixed;inset:0;background:rgba(20,16,10,.55);z-index:500;overflow-y:auto;padding:14px 8px;}
.ov.on{display:block;}
.sheet{background:#fff;max-width:680px;margin:0 auto;border-radius:var(--r);box-shadow:var(--sh2);overflow:hidden;}
.sheet-hd{background:var(--nv);color:#fff;padding:13px 16px;display:flex;align-items:flex-start;gap:10px;}
.sheet-date{font-size:10px;color:rgba(255,255,255,.65);font-weight:700;letter-spacing:.05em;}
.sheet-name{font-family:'Shippori Mincho',serif;font-size:17px;letter-spacing:.04em;line-height:1.4;}
.sheet-copy{font-size:11px;color:#f0c87a;margin-top:2px;}
.sheet-x{margin-left:auto;width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.2);color:#fff;font-size:15px;cursor:pointer;flex-shrink:0;}
.sheet-x:hover{background:rgba(255,255,255,.35);}
.sheet-bd{padding:14px 14px 18px;}
.cp-band{background:var(--gdl);border:1.5px solid var(--gd);border-radius:var(--rs);padding:8px 12px;font-size:11px;color:#7a5215;margin-bottom:12px;line-height:1.7;}
.cp-band b{color:var(--gd);}
.miss-band{background:var(--rdl);border:1.5px solid var(--rd);border-radius:var(--rs);padding:8px 12px;font-size:11px;color:var(--rd);margin-bottom:12px;line-height:1.7;}

.out-sec{border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:10px;overflow:hidden;}
.out-hd{background:var(--sf);padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bd);}
.out-title{font-size:11.5px;font-weight:800;color:var(--nv);flex:1;}
.copy-btn{padding:4px 14px;border-radius:12px;border:none;background:var(--nv);color:#fff;font-family:inherit;font-size:10.5px;font-weight:800;cursor:pointer;transition:.15s;white-space:nowrap;}
.copy-btn:hover{background:var(--nv2);}
.copy-btn.done{background:var(--ok);}
.out-body textarea{width:100%;border:none;padding:10px 12px;font-family:inherit;font-size:11px;line-height:1.75;color:var(--tx2);resize:vertical;outline:none;background:#fff;display:block;}

/* 参考画像（漫画プロンプト用） */
.ref-imgs{display:flex;gap:10px;flex-wrap:wrap;padding:10px 12px;background:var(--sf);border-top:1px solid var(--bd);}
.ref-hint{width:100%;font-size:9.5px;color:var(--tx3);font-weight:700;}
.ref-img{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9px;color:var(--tx3);font-weight:700;text-align:center;max-width:110px;}
.ref-img img{width:104px;height:104px;object-fit:contain;background:#fff;border:1px solid var(--bd);border-radius:6px;}

.foot-note{font-size:10px;color:var(--tx3);text-align:center;margin-top:14px;line-height:1.8;}

@media(max-width:520px){
  .cell{min-height:64px;}
  .dprod{font-size:8.5px;-webkit-line-clamp:2;}
  .mnav-label{font-size:16px;min-width:120px;}
  .sheet-name{font-size:15px;}
}

/* ── 進捗表示（カレンダーセル） ── */
.dprog{margin-top:auto;align-self:flex-start;font-size:8.5px;font-weight:800;
  color:#a6791f;background:#fbf2d8;border:1px solid #e6d19a;border-radius:6px;
  padding:0 5px;line-height:1.5;font-family:'M PLUS 1p',sans-serif;}
.dprog.full{color:#fff;background:#3a8f5f;border-color:#3a8f5f;}
.cell.all-done{background:#f0f9f3;}
.cell.all-done:hover{background:#e6f4ec;}

/* ── モーダル内：進捗サマリー ── */
.prog-summary{background:var(--nvl);border:1px solid var(--bd2);border-radius:10px;
  padding:9px 12px;margin-bottom:12px;}
.prog-txt{font-size:12px;color:var(--nv);}
.prog-txt b{font-size:14px;}
.prog-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.pchip{font-size:10px;padding:2px 8px;border-radius:10px;background:#fff;
  border:1px solid var(--bd);color:#999;font-weight:700;}
.pchip.on{background:#3a8f5f;border-color:#3a8f5f;color:#fff;}

/* ── モーダル内：作成済みチェック ── */
.done-chk{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:10.5px;
  font-weight:800;color:#3a8f5f;white-space:nowrap;user-select:none;}
.done-chk input{width:16px;height:16px;accent-color:#3a8f5f;cursor:pointer;margin:0;}
.out-title.title-done{color:#3a8f5f;}
.out-sec.sec-done{border-color:#8fce9f;}
.out-sec.sec-done .out-hd{background:#f0f9f3;}
.out-sec.sub-sec{margin-top:-4px;}
.out-sec.sub-sec .out-hd{background:#f3eee1;}

/* ── 実写：枚数切替 ── */
.story-nsel{display:flex;gap:3px;}
.nbtn{padding:3px 8px;border:1px solid var(--bd2);background:#fff;border-radius:8px;
  font-size:10px;font-weight:800;color:var(--nv);cursor:pointer;font-family:inherit;}
.nbtn.on{background:var(--nv);color:#fff;border-color:var(--nv);}
</style>
</head>
<body>

<header class="hd">
  <div class="hd-logo"><span>✦</span> エポラーシェ コンテンツカレンダー</div>
  <div class="hd-sp"></div>
  <div class="hd-upd" id="hd-upd"></div>
  <button class="hd-btn" onclick="loadData(true)">↻ 再読込</button>
</header>

<div class="main">
  <div class="mnav">
    <button class="mnav-btn" onclick="moveMonth(-1)">◀</button>
    <div class="mnav-label" id="mnav-label"></div>
    <button class="mnav-btn" onclick="moveMonth(1)">▶</button>
  </div>
  <div class="legend">
    <span class="lg-cp"><b>■ 金色</b>＝キャンペーン商品の日</span>
    <span class="lg-rec"><b>■ 紫バッジ</b>＝今月のおすすめ（水曜）</span>
    <span><b>金枠</b>＝今日</span>
  </div>
  <div id="cal-wrap"></div>
  <div class="foot-note">
    日付をタップすると、その日の漫画プロンプト・商品紹介文・キャプション・実写ストーリーズが表示されます。<br>
    商品の内容は受注アプリのスプレッドシート「SNS商品」シート、おすすめは「カレンダー設定」シートで編集できます。
  </div>
</div>

<!-- 出力モーダル -->
<div class="ov" id="ov" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <div class="sheet-hd">
      <div>
        <div class="sheet-date" id="sh-date"></div>
        <div class="sheet-name" id="sh-name"></div>
        <div class="sheet-copy" id="sh-copy"></div>
      </div>
      <button class="sheet-x" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-bd" id="sh-body"></div>
  </div>
</div>

<script>
// ============================================================
//  設定
// ============================================================
const GAS = 'https://script.google.com/macros/s/AKfycbyYVgsHNp6bjciWkA5GZwGe3qDKkjZRH1MLP8OTW5RmOgoo3DLRHKfT_MF5y6ATLHqA/exec';

// ── 漫画プロンプト：画風固定ブロック（変更しないこと） ──
const STYLE_BLOCK = `Delicate European storybook illustration style, gentle vintage atmosphere, warm and nostalgic yet quietly sophisticated.
Line art: thin, delicate, slightly uneven hand-inked lines — consistent fine weight throughout, NOT rough or heavily varied, NOT cross-hatched shading. Shading is built with soft watercolor tone gradation only, never with hatching lines, never with flat anime cel-shading, never with sharp digital gradients, never with glossy anime-style highlights on the eyes.
Coloring: pale, muted watercolor wash — visible bleeding and unevenness at edges, soft paper grain showing through the color. Warm ivory-cream paper background throughout. Limited palette: sage green, warm honey-brown (wood, books), soft cream, faint dusty blue, muted gold light. No flat saturated digital color, no vibrant anime palette.
Character (consistent across all panels): a beautiful Japanese woman, graceful and elegant, with long softly waving chestnut-brown hair falling past her shoulders, parted gently to one side, warm brown almond eyes with a calm, kind and quietly perceptive gaze, softly defined eyebrows, a gentle natural smile, an air of refined warmth and quiet confidence. She is a beauty researcher. Wearing a muted vermilion-red off-shoulder blouse with a softly gathered ruffle neckline and a thin delicate necklace (or a simple cream knit cardigan in home scenes, simple pale loungewear in night scenes).
Composition: cinematic pacing with generous white space and deliberate breathing gaps between panels — panels are not tightly packed, negative space is part of the design. Small botanical elements (thin leaf branches, potted plants) are allowed to overflow panel borders into the white margin for an organic layered feel. Mix extreme close-ups (eyes, hands, small objects like a cosmetic bottle, a teacup or an open research notebook), profile shots, and half-body cuts. Warm backlight and window light recur as a visual motif. Blurred background figures may appear small and distant in outdoor scenes.
Text elements: two distinct types — (1) small rounded hand-drawn speech/thought bubbles directly on the character for brief interior murmurs, and (2) separate torn-paper note captions (drawn as if taped to the page with visible washi-tape corners) for reflective narration lines. Japanese text is short, natural handwritten font, never long paragraphs. No anime-style bold sound effect text.
Background: minimal — torn paper scraps taped at the corners, a few handwritten words, small potted plants, books, a writing desk, soft abstract linework, generous cream-white space. Entire page has a faint watercolor paper texture with soft ink bleed for a warm handmade feel. Avoid clean vector-flat digital backgrounds.
Vertical portrait ratio (9:16), asymmetric panel grid with 5 to 7 panels per page, thin light panel borders, deliberate visual gaps between panels. High resolution.`;

// ── 固定ハッシュタグ（合計5個以内厳守） ──
const BASE_TAGS = ['#エポラーシェ', '#岡江美希', '#無添加化粧品'];

// ============================================================
//  状態
// ============================================================
let DATA = null;          // {campaigns, sns_products, monthly_recommend, products, updated_at}
let viewY, viewM;         // 表示中の年・月（Mは0始まり）

const WD = ['日','月','火','水','木','金','土'];
const todayD = new Date(); todayD.setHours(0,0,0,0);

// ============================================================
//  データ取得
// ============================================================
async function loadData(force){
  const wrap = document.getElementById('cal-wrap');
  wrap.innerHTML = '<div class="notice">📡 データを読み込み中…</div>';
  try{
    const res = await fetch(GAS + '?action=calendar&t=' + Date.now());
    DATA = await res.json();
    if(DATA.error) throw new Error(DATA.error);
    document.getElementById('hd-upd').textContent = DATA.updated_at ? '設定更新: ' + DATA.updated_at : '';
    if(!DATA.sns_products || !DATA.sns_products.length){
      wrap.innerHTML = '<div class="notice err"><b>「SNS商品」シートが空、またはGASが未更新です。</b><br>'
        + '① Code.gs にカレンダー用の追加コードが反映され、再デプロイされているか確認してください。<br>'
        + '② スプレッドシートに「SNS商品」シートを作成し、A列:商品名 / B列:キャッチコピー / C列:特徴 / D列:追加ハッシュタグ / E列:備考 を入力してください。</div>';
      return;
    }
    renderCal();
  }catch(e){
    wrap.innerHTML = '<div class="notice err"><b>読み込みエラー：</b>' + e.message + '<br>GASのデプロイURL・追加コードの反映を確認してください。</div>';
  }
}

// ============================================================
//  日付ユーティリティ
// ============================================================
function parseYMD(str){
  if(!str) return null;
  const d = new Date(String(str).replace(/\//g,'-') + 'T00:00:00');
  return isNaN(d) ? null : d;
}
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function dayNum(d){ return Math.floor(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()) / 86400000); }
function fmtMD(str){ return String(str||'').replace(/^\d{4}\//,''); }

// キャンペーンの「告知開始日」= announce_date 優先、なければ date_start
function cpAnnounceStart(cp){ return parseYMD(cp.announce_date || cp.date_start); }
function cpEnd(cp){ const e = parseYMD(cp.date_end); if(e) e.setHours(23,59,59,999); return e; }
function cpActiveOn(cp, d){
  const s = cpAnnounceStart(cp), e = cpEnd(cp);
  if(s && d < s) return false;
  if(e && d > e) return false;
  return !!(s || e);
}

// キャンペーン内容の要約文
function cpSummary(cp){
  if(cp.type==='C') return 'クーポン【' + (cp.coupon_code||'') + '】' + (cp.disc_amount ? '¥'+Number(cp.disc_amount).toLocaleString()+'OFF' : (cp.discount_pct ? cp.discount_pct+'%OFF' : '')) + (cp.min_amount ? '（¥'+Number(cp.min_amount).toLocaleString()+'以上）' : '');
  if(cp.type==='D') return '¥' + Number(cp.gift_min||0).toLocaleString() + '以上のご購入で【' + (cp.gift_name||'') + '】プレゼント';
  if(cp.type==='E') return '¥' + Number(cp.prog_start||0).toLocaleString() + '以上のご購入で【' + (cp.prog_gift_name||'') + '】プレゼント（金額に応じて増加）';
  if(cp.rules && cp.rules.length) return cp.rules.map(r => (r.desc||'') + ' ¥' + Number(r.disc_price||0).toLocaleString() + (r.pct ? '（'+r.pct+'%OFF）' : '')).join(' ／ ');
  return '';
}

// ============================================================
//  日別の商品割り当て
//  優先度: ①CP開始日+翌日（複数商品は1日1商品ずつ） ②水曜=月間おすすめ ③通常ローテ
// ============================================================
function assignDay(d){
  const sns = DATA.sns_products;

  // ① キャンペーン開始日・翌日
  for(const cp of (DATA.campaigns||[])){
    const names = String(cp.products||'').split(',').map(s=>s.trim()).filter(Boolean);
    if(!names.length) continue;
    const start = cpAnnounceStart(cp);
    if(!start) continue;
    for(let i=0;i<names.length;i++){
      const slot = new Date(start); slot.setDate(slot.getDate()+i);
      const e = cpEnd(cp);
      if(e && slot > e) break;
      if(sameDay(d, slot)){
        const hit = sns.find(p => p.name === names[i]) ||
                    sns.find(p => p.name.indexOf(names[i]) !== -1 || names[i].indexOf(p.name) !== -1);
        return { product: hit || {name:names[i], copy:'', features:'', tags:'', _missing:true},
                 kind:'cp', campaign: cp };
      }
    }
  }

  // ② 水曜日 = 今月のおすすめ
  if(d.getDay() === 3){
    const rec = (DATA.monthly_recommend||[]).find(r => r.month === d.getMonth()+1);
    if(rec && rec.products.length){
      const wk = Math.floor((d.getDate()-1)/7);
      const nm = rec.products[wk % rec.products.length];
      const hit = sns.find(p => p.name === nm) ||
                  sns.find(p => p.name.indexOf(nm) !== -1 || nm.indexOf(p.name) !== -1);
      return { product: hit || {name:nm, copy:'', features:'', tags:'', _missing:true}, kind:'rec' };
    }
  }

  // ③ 通常ローテーション
  const p = sns[dayNum(d) % sns.length];
  return { product: p, kind:'normal' };
}

// その日の商品に有効なキャンペーンが被っていれば返す（②③の日でもCP情報を差し込むため）
function findCampaignFor(product, d){
  for(const cp of (DATA.campaigns||[])){
    if(!cpActiveOn(cp, d)) continue;
    const names = String(cp.products||'').split(',').map(s=>s.trim()).filter(Boolean);
    if(names.some(n => product.name === n || product.name.indexOf(n)!==-1 || n.indexOf(product.name)!==-1)) return cp;
  }
  return null;
}

// ============================================================
//  カレンダー描画
// ============================================================
function moveMonth(diff){
  viewM += diff;
  if(viewM < 0){ viewM = 11; viewY--; }
  if(viewM > 11){ viewM = 0; viewY++; }
  renderCal();
}

function renderCal(){
  document.getElementById('mnav-label').textContent = viewY + '年 ' + (viewM+1) + '月';
  const wrap = document.getElementById('cal-wrap');
  const first = new Date(viewY, viewM, 1);
  const lastDate = new Date(viewY, viewM+1, 0).getDate();
  const lead = first.getDay();

  let html = '<div class="cal"><div class="cal-week">' + WD.map(w=>'<div>'+w+'</div>').join('') + '</div><div class="cal-grid">';
  for(let i=0;i<lead;i++) html += '<div class="cell other"></div>';
  for(let day=1;day<=lastDate;day++){
    const d = new Date(viewY, viewM, day);
    const a = assignDay(d);
    const isToday = sameDay(d, todayD);
    const cls = ['cell'];
    if(d.getDay()===0) cls.push('sun');
    if(d.getDay()===6) cls.push('sat');
    if(isToday) cls.push('today');
    if(a.kind==='cp') cls.push('is-cp');
    let badge = '';
    if(a.kind==='cp') badge = '<span class="dbadge b-cp">🎯 CP</span>';
    else if(a.kind==='rec') badge = '<span class="dbadge b-rec">⭐ おすすめ</span>';
    const miss = a.product._missing ? '<span class="dmiss">⚠ 情報未登録</span>' : '';
    const dn = doneCount(viewY, viewM, day);
    const tot = OUT_KINDS.length;
    let prog = '';
    if(dn>0){
      const full = (dn>=tot);
      prog = '<span class="dprog '+(full?'full':'')+'">'+(full?'✓ 完了':dn+'/'+tot)+'</span>';
      if(full) cls.push('all-done');
    }
    html += '<div class="'+cls.join(' ')+'" onclick="openSheet('+viewY+','+viewM+','+day+')">'
          + '<span class="dnum">'+day+'</span>' + badge
          + '<span class="dprod">'+esc(a.product.name)+'</span>' + miss + prog + '</div>';
  }
  const tail = (lead + lastDate) % 7;
  if(tail !== 0) for(let i=tail;i<7;i++) html += '<div class="cell other"></div>';
  html += '</div></div>';
  wrap.innerHTML = html;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

//  価格の取得（商品シートと名前一致で照合）
// ============================================================
function findPrice(name){
  const list = (DATA.products||[]).filter(p => p.name === name);
  if(!list.length) return '';
  const prices = list.map(p => Number(p.price)||0).filter(n => n>0);
  if(!prices.length) return '';
  const min = Math.min(...prices);
  return '¥' + min.toLocaleString() + '（税込）' + (prices.length>1 ? '〜' : '');
}

const REF_ALIAS = {
  'トランスルーセントパウダー': ['TLP'],
  'マイクロフィニッシングパウダーセット': ['マイクロフィニッシングパウダー', 'MFP'],
};
function collectImgs(name){
  const keys = [name];
  const stripped = name.replace(/セット$/, '');
  if(stripped !== name) keys.push(stripped);
  (REF_ALIAS[name] || []).forEach(function(k){ keys.push(k); });
  const seen = {};
  const out = [];
  (DATA.products || []).forEach(function(pr){
    if(!pr.img) return;
    const hit = keys.some(function(k){ return pr.name.indexOf(k) === 0; });
    if(!hit) return;
    if(seen[pr.img]) return;
    seen[pr.img] = 1;
    out.push({ label: pr.name + (pr.spec ? '（' + pr.spec + '）' : ''), img: pr.img });
  });
  return out.slice(0, 6);
}

function toggleDone(y,m,day,kind,on){
  const k = dateKey(y,m,day);
  if(!PROGRESS[k]) PROGRESS[k] = {};
  if(on) PROGRESS[k][kind] = 1; else delete PROGRESS[k][kind];
  if(Object.keys(PROGRESS[k]).length===0) delete PROGRESS[k];
  saveProgressRemote(dateKey(y,m,day), kind, on ? 1 : 0);
  renderCal();
}
function doneCount(y,m,day){ return Object.keys(getDone(y,m,day)).length; }

function buildBlogImg(p, cp){
  const t = detectCat(p);
  const bg = ST_BG[t] || ST_BG.skin;
  const L = [];
  L.push('【ブログ差し込み用 画像プロンプト】nanobananaPro／横長16:9推奨');
  L.push('※冒頭の添付画像は上からコピペするので、これは本文の途中に入れる写真用です');
  L.push('──────────────');
  L.push('① 商品の主役カット（記事の中ほどに）');
  L.push('Photorealistic 16:9. ' + bg + '. Clean hero shot of the ' + p.name + ' product on a refined surface with soft natural light and minimal props. Warm, inviting, editorial skincare blog photography. Keep the real product package unchanged.');
  L.push('');
  L.push('② 暮らしの中の使用シーン（お気に入りポイントの近くに）');
  L.push('Photorealistic 16:9. ' + bg + '. A warm lifestyle scene suggesting daily use of ' + p.name + ' — soft hands or a dressing table vignette, face out of frame or softly blurred. Cozy, authentic, aspirational. Space kept calm for a natural feel.');
  L.push('');
  L.push('③ 締めの余韻カット（記事の最後に）');
  L.push('Photorealistic 16:9. ' + bg + '. A serene closing still life with the ' + p.name + ', gentle morning light, a hint of greenery or linen texture, calm and elegant. Keep the real product package unchanged.');
  return L.join('\n');
}

// ── 実写ストーリーズ（Instagramストーリーズ→リール用・5〜7枚） ──
// フック→共感→発見→証拠→背中押しの構成。各スライドに焼き込みテキストと実写プロンプト。
// 薬機法OK（整える・ケア・なめらか等のみ）。カテゴリ別に切り口を自動出し分け。
const ST_HOOK = {
  skin: [['高い化粧品なのに、','なんで夕方また乾くの?'], 'その乾き、40代からぐっと増えます。'],
  make: [['塗った直後はきれい。','なのに、昼にはくずれてる。'], 'その"崩れ"、下地とお粉で変わります。'],
  hair: [['朝はまとまるのに、','夕方には広がってしまう。'], 'その手ざわり、洗い方から変えられます。'],
  inner:[['外側のケアは、','もう充分やっている。'], '足りないのは、内側からのケアかも。'],
  other:[['毎日のことだから、','妥協したくない。'], 'その小さな習慣、心地よさで選びませんか。'],
};
const ST_BG = {
  skin:'deep navy and gold luxury cosmetic aesthetic, soft warm morning light',
  make:'elegant navy and gold beauty editorial, soft studio light, refined',
  hair:'warm navy and gold premium haircare mood, soft directional light',
  inner:'calm navy and gold wellness aesthetic, natural warm light, birch and tea props',
  other:'refined navy and gold lifestyle aesthetic, soft clean light',
};
const ST_CTA = '📍 直営店舗／オンラインで\n☎ フリーコール 0120-56-1115\n（平日10:00〜14:00・15:00〜18:30）\n▶ プロフィールのリンクから';

function stVoices(p){
  const raw = String(p.voice||'');
  if(!raw) return ['',''];
  const arr = raw.split('｜').map(s=>s.replace(/（お客様アンケートより）/g,'').trim()).filter(Boolean);
  return [arr[0]||'', (arr[1] && arr[1]!==arr[0]) ? arr[1] : ''];
}

function buildStories(p, cp, n){
  n = n || 5;
  const t = detectCat(p);
  const hook = ST_HOOK[t] || ST_HOOK.skin;
  const bg = ST_BG[t] || ST_BG.skin;
  const price = findPrice(p.name);
  const isSkin = (t==='skin');
  const vs = stVoices(p);
  const v1 = vs[0], v2 = vs[1];
  const feat = String(p.features||'').split('／').filter(Boolean)[0] || '';

  const L = [];
  L.push('【実写ストーリーズ構成 '+n+'枚】9:16縦・各スライドに文字を焼き込み・モデルは顔控えめ');
  L.push('各スライドの「文字」をnanobananaProの文字入れに、「実写」を画像生成に貼ってください。');
  if(cp) L.push('開催中：' + cp.name + '（' + cpSummary(cp) + '／' + fmtMD(cp.date_end) + 'まで）');
  L.push('══════════════════════');

  // 1 フック
  L.push('▼ 1枚目｜フック（指を止める）');
  L.push('［文字］');
  L.push('（上・大きく）「' + hook[0][0]);
  L.push('　　　　　　　' + hook[0][1] + '」');
  L.push('（中央）' + hook[1]);
  L.push('（下・小さく）▶ 実は"選び方"かもしれません。次へ');
  L.push('［実写］Photorealistic vertical 9:16. ' + bg + '. A woman in her late 40s-50s in daily life, shown from behind or three-quarter with face softly out of focus, an honest slightly-troubled expression relating to the concern. Cinematic, high-end. Upper and lower areas darker/clean for Japanese text. Clean Japanese text rendering.');
  L.push('──────────────');

  // 2 共感
  L.push('▼ 2枚目｜共感（自分ごとに）');
  L.push('［文字］');
  L.push('（上）朝は気に入っていたのに、');
  L.push('　　　時間が経つと物足りない。');
  L.push('（中央）"ちゃんとケアしているのに"');
  L.push('　　　　と感じること、ありませんか?');
  L.push('（下）▶ そこを見直した1本があります。次へ');
  L.push('［実写］Photorealistic vertical 9:16. ' + bg + '. Intimate close-up of a woman\'s hands (40s-50s) in soft natural light, a quiet contemplative moment. Warm, authentic, shallow depth of field. Generous clean space top and bottom for Japanese text.');
  L.push('──────────────');

  // 3 発見（商品）
  L.push('▼ 3枚目｜発見（商品の魅力を具体で）');
  L.push('［文字］');
  L.push('（上）エポラーシェ');
  L.push('　　　' + p.name);
  L.push('（中央）' + (isSkin ? '軽いのに、しっとり続く。\n　　　　少量でなめらかに広がる。' : '毎日に取り入れやすい。\n　　　　続けやすさが、いちばんの魅力。'));
  if(price) L.push('　　　　' + price);
  if(feat) L.push('　　　　' + feat);
  L.push('（下）▶ 使った方の声を紹介します。次へ');
  L.push('［実写］Photorealistic vertical 9:16 hero shot of the ' + p.name + ' product, ' + bg + '. Product razor-sharp and centered on an elegant surface, subtle texture swipe or minimal natural props. Luxury cosmetic advertising photography. Upper space clean for product name. IMPORTANT: keep the real product package unchanged.');
  L.push('──────────────');

  // 4 証拠（声）
  L.push('▼ 4枚目｜証拠（お客様の声）');
  L.push('［文字］');
  L.push('（上・小見出し）お客様アンケートより');
  L.push('（中央）' + (v1 ? '「' + v1 + '」' : '「使い心地が気に入っています」'));
  if(v2) L.push('　　　　「' + v2 + '」');
  L.push('（下）▶ 気になった方へ。次へ');
  L.push('［実写］Photorealistic vertical 9:16. ' + bg + '. A woman in her 50s (three-quarter view, face gently cropped or softly out of focus, calm confident expression) using or holding the product naturally in bright soft light. Trustworthy, real, premium campaign look. Darker clean panels top and bottom for testimonial text.');
  L.push('※声は実際のアンケート／掲載前に佐久間さんの確認を');
  L.push('──────────────');

  // ここまでで4枚。残りは「中間スライド（任意）＋最終CTA」で合計n枚にする。
  // n=5 → CTAが5枚目。n=6 → 中間1枚＋CTA。n=7 → 中間2枚＋CTA。
  let no = 5;

  // 中間①（n>=6）：使い方 or 続けるメリット
  if(n >= 6){
    if(isSkin){
      L.push('▼ '+no+'枚目｜使い方（岡江美希流）');
      L.push('［文字］');
      L.push('（上・小見出し）岡江美希流の使い方');
      L.push('（中央）化粧水・美容液で整えたあと、');
      L.push('　　　　少量を手にとって、');
      L.push('　　　　顔全体にやさしくなじませる。');
      L.push('　　　　朝メイク前にも。');
      L.push('（下）▶ 続けやすさの理由は次へ');
      L.push('［実写］Photorealistic vertical 9:16. ' + bg + '. Close-up of fingertips gently applying the product to the cheek, dewy skin catching soft light, serene mood, face softly cropped. Premium skincare campaign. Clean space for step text.');
    } else {
      L.push('▼ '+no+'枚目｜続けるメリット');
      L.push('［文字］');
      L.push('（上・小見出し）続けるほど、うれしい');
      L.push('（中央）定期便なら最大20%OFF、');
      L.push('　　　　送料・代引手数料は弊社負担。');
      L.push('　　　　ポイントも貯まる・使える。');
      L.push('（下）▶ くわしくは次へ');
      L.push('［実写］Photorealistic vertical 9:16. ' + bg + '. The product with subtle gold accents conveying ongoing care, elegant still life. Clean space for benefit text. Keep the real product package unchanged.');
    }
    L.push('──────────────');
    no++;
  }

  // 7枚目（任意）：信頼・安心
  if(n >= 7){
    L.push('▼ '+no+'枚目｜信頼・安心');
    L.push('［文字］');
    L.push('（上・小見出し）選ばれ続ける理由');
    L.push('（中央）無添加・水溶性のシンプル設計。');
    L.push('　　　　国内製造・美容研究家監修。');
    L.push('　　　　20年以上、肌と向き合ってきました。');
    L.push('（下）▶ 最後にご案内です。次へ');
    L.push('［実写］Photorealistic vertical 9:16. ' + bg + '. Refined brand still life conveying trust and craftsmanship — the product with soft gold light, minimal premium styling. Clean space for text. Keep the real product package unchanged.');
    L.push('──────────────');
    no++;
  }

  // 最終：背中押し
  L.push('▼ '+no+'枚目｜背中押し（CTA・買い方）');
  L.push('［文字］');
  L.push('（上）気になっていた方こそ、一度。');
  L.push('（中央）' + p.name);
  if(price) L.push('　　　　' + price);
  L.push('　　　　無添加・シンプルケア。');
  L.push('　　　　美容研究家 岡江美希 監修。');
  L.push('（下・導線）');
  L.push(ST_CTA);
  L.push('［実写］Photorealistic vertical 9:16 elegant still life of the ' + p.name + ' on soft linen or refined surface, ' + bg + '. Minimal, generous empty space for branding and CTA text. Calm luxury mood. Lower third clean for contact info. Keep the real product package unchanged.');

  return L.join('\n');
}

let SHEET_CTX = null;   // 現在開いている日付とデータ
let STORY_N = 5;        // 実写ストーリーズの枚数

function openSheet(y,m,day){
  const d = new Date(y,m,day);
  const a = assignDay(d);
  const p = a.product;
  const cp = a.kind==='cp' ? a.campaign : findCampaignFor(p, d);
  SHEET_CTX = {y,m,day,d,p,cp};

  document.getElementById('sh-date').textContent = y + '年' + (m+1) + '月' + day + '日（' + WD[d.getDay()] + '）'
    + (a.kind==='cp' ? '　🎯 キャンペーン商品' : a.kind==='rec' ? '　⭐ 今月のおすすめ' : '');
  document.getElementById('sh-name').textContent = p.name;
  document.getElementById('sh-copy').textContent = p.copy || '';
  renderSheetBody();
  document.getElementById('ov').classList.add('on');
}

function renderSheetBody(){
  const {y,m,day,d,p,cp} = SHEET_CTX;
  const done = getDone(y,m,day);

  let body = '';
  if(p._missing){
    body += '<div class="miss-band">⚠ この商品は「SNS商品」シートに未登録のため、キャッチコピー・特徴が空欄です。シートに行を追加すると自動で反映されます。</div>';
  }
  if(cp){
    body += '<div class="cp-band">🎯 <b>' + esc(cp.name) + '</b>　' + esc(cpSummary(cp)) + '<br>期間：' + esc(fmtMD(cpAnnounceStartStr(cp))) + '〜' + esc(fmtMD(cp.date_end)) + '　※キャプション・プロンプトに自動反映済み</div>';
  }

  // 進捗サマリー
  const total = OUT_KINDS.length;
  const doneN = OUT_KINDS.filter(k=>done[k.key]).length;
  body += '<div class="prog-summary"><span class="prog-txt">この日の制作：<b>'+doneN+' / '+total+'</b> 完了</span>'
        + '<div class="prog-chips">' + OUT_KINDS.map(k=>'<span class="pchip '+(done[k.key]?'on':'')+'">'+(done[k.key]?'✓ ':'')+k.label+'</span>').join('') + '</div></div>';

  // 出力（kindキー付き）
  const outs = [
    {kind:'comic', title:'🎨 漫画プロンプト（チャッピーイメージ2用）', text:buildComic(p, cp), rows:14, ref:true},
    {kind:'intro', title:'📝 商品紹介文', text:buildIntro(p, cp), rows:8},
    {kind:'insta', title:'📷 Instagramキャプション', text:buildInsta(p, cp), rows:8},
    {kind:'yt',    title:'▶️ YouTube Shortsキャプション', text:buildYT(p, cp), rows:8},
    {kind:'blog',  title:'📰 ブログ記事下書き（eporashe開発日記用）', text:buildBlog(p, cp, d), rows:16, blogimg:true},
    {kind:'voice', title:'💌 お客様の声 紹介用テンプレ', text:buildVoice(p, cp), rows:10},
    {kind:'stories', title:'📸 実写ストーリーズ（画像＋文字）', text:buildStories(p, cp, STORY_N), rows:20, story:true},
  ];

  outs.forEach((o,i)=>{
    const isDone = !!done[o.kind];
    let head = '<div class="out-hd">'
      + '<label class="done-chk"><input type="checkbox" '+(isDone?'checked':'')+' onchange="toggleDone('+y+','+m+','+day+',\''+o.kind+'\',this.checked); renderSheetBody();"><span>作成済み</span></label>'
      + '<span class="out-title '+(isDone?'title-done':'')+'">'+o.title+'</span>';
    // 実写だけ枚数切替
    if(o.story){
      head += '<span class="story-nsel">'
        + [5,6,7].map(nn=>'<button class="nbtn '+(STORY_N===nn?'on':'')+'" onclick="STORY_N='+nn+';renderSheetBody();">'+nn+'枚</button>').join('')
        + '</span>';
    }
    head += '<button class="copy-btn" onclick="copyOut(this,'+i+')">コピー</button></div>';

    body += '<div class="out-sec'+(isDone?' sec-done':'')+'">' + head
          + '<div class="out-body"><textarea id="out-'+i+'" rows="'+o.rows+'" readonly>'+esc(o.text)+'</textarea></div>'
          + (o.ref ? buildRefImgs(p) : '')
          + '</div>';

    // ブログの直後に画像プロンプトを別セクションで
    if(o.blogimg){
      const bimg = buildBlogImg(p, cp);
      body += '<div class="out-sec sub-sec">'
        + '<div class="out-hd"><span class="out-title">🖼 ブログ差し込み画像プロンプト（本文の途中に入れる写真）</span>'
        + '<button class="copy-btn" onclick="copyBlogImg(this)">コピー</button></div>'
        + '<div class="out-body"><textarea id="out-blogimg" rows="14" readonly>'+esc(bimg)+'</textarea></div></div>';
    }
  });

  document.getElementById('sh-body').innerHTML = body;
}

async function copyBlogImg(btn){
  const ta = document.getElementById('out-blogimg');
  try{ await navigator.clipboard.writeText(ta.value); }
  catch(e){ ta.select(); document.execCommand('copy'); }
  btn.textContent='✅ コピー済み'; btn.classList.add('done');
  setTimeout(()=>{ btn.textContent='コピー'; btn.classList.remove('done'); },1800);
}

function closeSheet(){ document.getElementById('ov').classList.remove('on'); }

async function copyOut(btn, i){
  const ta = document.getElementById('out-'+i);
  try{
    await navigator.clipboard.writeText(ta.value);
  }catch(e){
    ta.select(); document.execCommand('copy');
  }
  btn.textContent = '✅ コピー済み'; btn.classList.add('done');
  setTimeout(()=>{ btn.textContent='コピー'; btn.classList.remove('done'); }, 1800);
}
